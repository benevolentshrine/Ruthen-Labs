# SANDBOX v2.0 Security Policy Manifest
# ============================================
# This is the Pre-Execution Gate policy. It is validated BEFORE any fork()
# happens. Changes to this file take effect on the NEXT execution — no restart needed.
#
# Location: ~/.config/sandbox/security_policy.yaml
# (SANDBOX will create this file on first run if it does not exist)

version: "2.0"

# ---------------------------------------------------------------------------
# Config Hardening (CVE-2026-25725 Prevention)
#
# These paths are made INVISIBLE inside the sandbox via Landlock's
# default-deny policy. The agent is physically unable to read or write
# these files, preventing startup-hook injection attacks.
# ---------------------------------------------------------------------------
invisible_inside_sandbox:
  # Agent configuration directories
  - "~/.config/sandbox"
  - "~/.antigravity"
  - "~/.sandbox"
  - "~/.claude"
  - "~/.gemini"
  # Environment variable files
  - "**/.env"
  - "**/.env.local"
  - "**/.env.production"
  - "**/.env.staging"
  - "**/.env.development"
  # Credential stores
  - "~/.ssh"
  - "~/.gnupg"
  - "~/.aws"
  - "~/.netrc"
  # Shell startup files (prevent hook injection)
  - "~/.bashrc"
  - "~/.zshrc"
  - "~/.profile"
  - "~/.bash_profile"

# ---------------------------------------------------------------------------
# Tool Call Category Gates
#
# These categories describe the TYPE of action a tool call is requesting.
# SANDBOX validates the category before routing to any runner.
# ---------------------------------------------------------------------------

# Categories that are allowed to proceed to kernel enforcement
allowed_tool_categories:
  - file_read_workspace       # Read files inside the declared workspace
  - file_write_workspace      # Write files inside the declared workspace
  - process_stdio             # Read stdout/stderr from a subprocess
  - filesystem_stat           # stat/lstat/fstat — metadata only
  - wasm_execute              # Execute a validated WASM module

# Categories that are auto-blocked (no prompt, instant DENY)
denied_tool_categories:
  - network_egress            # Any outbound TCP/UDP connection
  - dns_lookup                # DNS resolution (prevents covert channel)
  - process_spawn_arbitrary   # Spawning arbitrary processes from inside sandbox
  - kernel_module_load        # Loading kernel modules
  - raw_socket                # Raw socket creation (e.g., for packet injection)
  - env_var_read_sensitive    # Reading secrets/tokens from environment
  - symlink_follow_external   # Following symlinks pointing outside the workspace
  - cgroup_escape             # Attempts to write to /sys/fs/cgroup
  - ptrace_attach             # Attaching a debugger to another process

# ---------------------------------------------------------------------------
# Resource Limits (enforced by Cgroups v2 Layer)
#
# These values are passed directly to the cgroup controller.
# Changing these requires a kernel that supports cgroup v2.
# ---------------------------------------------------------------------------
resource_limits:
  # Maximum memory the sandboxed process may allocate (prevents OOM attacks)
  memory_mb: 512

  # Maximum CPU time as a percentage of ONE single core
  # 25 = 25% of 1 core = "cpu.max 25000 100000"
  cpu_percent: 25

  # Maximum number of processes/threads the sandbox may spawn (prevents fork bombs)
  pids_max: 20

  # Wallclock execution timeout in seconds (hard kill if exceeded)
  max_execution_seconds: 30

# ---------------------------------------------------------------------------
# Audit & Reporting
# ---------------------------------------------------------------------------
audit:
  # Log every pre-execution gate decision (allow and deny)
  log_all_decisions: true

  # Log resource limit violations (OOM kills, CPU throttling events)
  log_resource_violations: true

  # Severity level for denied tool categories
  denied_category_severity: "Critical"
